<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiantAnimator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #070B12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      color: #e2e8f0;
      user-select: none;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #f1f5f9;
    }

    .logo-text span {
      color: #38bdf8;
    }

    .status {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 14px;
      min-height: 18px;
      text-align: center;
      max-width: 300px;
      line-height: 1.4;
      transition: color 0.3s;
    }

    .status.highlight {
      color: #94a3b8;
    }

    .bar-track {
      width: 260px;
      height: 2px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    /* indeterminate por padrão */
    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #0ea5e9, #38bdf8, #6366f1);
      border-radius: 2px;
      width: 50%;
      animation: slide 1.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* quando temos progresso real */
    .bar-fill.determinate {
      animation: none;
      width: var(--progress, 0%);
      transition: width 0.5s ease;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    .version {
      position: absolute;
      bottom: 18px;
      font-size: 11px;
      color: #1e293b;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-icon">▶</div>
    <div class="logo-text">Giant<span>Animator</span></div>
  </div>

  <div class="status" id="status">Iniciando...</div>

  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
  </div>

  <div class="version" id="version"></div>

  <script>
    // Chamado pelo processo principal via executeJavaScript
    window.updateSplash = function(msg, progress) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = msg;
      statusEl.classList.toggle('highlight', !!msg);

      const bar = document.getElementById('bar');
      if (progress !== undefined && progress >= 0) {
        bar.classList.add('determinate');
        bar.style.setProperty('--progress', progress + '%');
      } else {
        bar.classList.remove('determinate');
        bar.style.removeProperty('--progress');
      }
    };

    window.setVersion = function(v) {
      document.getElementById('version').textContent = 'v' + v;
    };
  </script>
</body>
</html>
