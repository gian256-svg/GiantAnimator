<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiantAnimator — Automation Suite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- HEADER FIXO -->
        <header id="main-header">
            <h1>GiantAnimator <span>4K</span></h1>
            <div class="status-bar">
                <span id="status-text">Pronto</span>
                <span id="connection-dot" class="dot"></span>
            </div>
        </header>

        <!-- LAYOUT PRINCIPAL: split-screen -->
        <div id="workspace">

            <!-- COLUNA ESQUERDA: vídeo + upload + histórico -->
            <div id="left-panel">

                <section id="upload-section">
                    <!-- Tabs de tipo de upload -->
                    <div class="upload-tabs">
                        <button class="upload-tab active" data-tab="image">
                            🖼️ Imagem
                        </button>
                        <button class="upload-tab" data-tab="table">
                            📊 Planilha
                        </button>
                    </div>

                    <!-- Drop zone: Imagem -->
                    <div id="drop-zone-image" class="drop-zone active">
                        <div class="drop-icon">🖼️</div>
                        <p>Cole, arraste ou clique para enviar uma <strong>imagem</strong> de gráfico</p>
                        <span class="drop-hint">JPG, PNG, WEBP — até 10MB</span>
                        <input type="file" id="file-input-image" hidden accept="image/*">
                    </div>

                    <!-- Drop zone: Tabela -->
                    <div id="drop-zone-table" class="drop-zone" style="display:none;">
                        <div class="drop-icon">📊</div>
                        <p>Cole, arraste ou clique para enviar uma <strong>planilha</strong></p>
                        <span class="drop-hint">XLSX, XLS, CSV, ODS — até 20MB</span>
                        <input type="file" id="file-input-table" hidden
                               accept=".xlsx,.xls,.csv,.ods">
                    </div>
                </section>

                <section id="processing-section" style="display:none;">
                    <div class="loader"></div>
                    <p id="processing-filename">Processando...</p>
                </section>

                <!-- PREVIEW DO VÍDEO FIXO -->
                <section id="preview-section" style="display:none;">
                    <div id="video-wrapper">
                        <video id="preview-video" controls playsinline></video>
                    </div>
                    <div id="preview-actions">
                        <button id="btn-rerender" class="btn-primary">
                            ↺ Re-renderizar
                        </button>
                        <button id="btn-download" class="btn-secondary">
                            ⬇ Download
                        </button>
                    </div>
                </section>

                <section id="history-section">
                    <h2>Histórico</h2>
                    <div id="history-list"></div>
                </section>

            </div>

            <!-- COLUNA DIREITA: painel de propriedades com scroll próprio -->
            <div id="right-panel" style="display:none;">

                <div id="props-header">
                    <span>⚙ Propriedades</span>
                    <button id="btn-copy-json" class="btn-ghost">📋 Copiar JSON</button>
                </div>

                <!-- BLOCO: Dados -->
                <div class="prop-block" id="block-dados">
                    <div class="prop-block-title" data-target="body-dados">
                        <span>📊 Dados</span>
                        <div class="block-actions">
                            <button class="btn-reset-block" data-block="dados">Reset</button>
                            <span class="chevron">▲</span>
                        </div>
                    </div>
                    <div class="prop-block-body" id="body-dados">
                        <div class="prop-row">
                            <label>Título</label>
                            <input type="text" id="prop-title" placeholder="Título do gráfico">
                        </div>
                        <!-- Labels e valores gerados dinamicamente pelo app.js -->
                        <div id="dynamic-data-fields"></div>
                    </div>
                </div>

                <!-- BLOCO: Cores -->
                <div class="prop-block" id="block-cores">
                    <div class="prop-block-title" data-target="body-cores">
                        <span>🎨 Cores</span>
                        <div class="block-actions">
                            <button class="btn-reset-block" data-block="cores">Reset</button>
                            <span class="chevron">▼</span>
                        </div>
                    </div>
                    <div class="prop-block-body collapsed" id="body-cores">
                        <div class="prop-row">
                            <label>Background</label>
                            <div class="color-input-group">
                                <input type="color" id="prop-bg-color" value="#0f1117">
                                <input type="text"  id="prop-bg-color-hex" value="#0f1117" maxlength="7">
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Texto principal</label>
                            <div class="color-input-group">
                                <input type="color" id="prop-text-color" value="#ffffff">
                                <input type="text"  id="prop-text-color-hex" value="#ffffff" maxlength="7">
                            </div>
                        </div>
                        <div class="prop-row">
                            <label>Texto secundário</label>
                            <div class="color-input-group">
                                <input type="color" id="prop-muted-color" value="#a0a0b0">
                                <input type="text"  id="prop-muted-color-hex" value="#a0a0b0" maxlength="7">
                            </div>
                        </div>
                        <!-- Cores dos elementos geradas dinamicamente -->
                        <div id="dynamic-color-fields"></div>
                    </div>
                </div>

                <!-- BLOCO: Escala -->
                <div class="prop-block" id="block-escala">
                    <div class="prop-block-title" data-target="body-escala">
                        <span>⚖ Escala</span>
                        <div class="block-actions">
                            <button class="btn-reset-block" data-block="escala">Reset</button>
                            <span class="chevron">▼</span>
                        </div>
                    </div>
                    <div class="prop-block-body collapsed" id="body-escala">
                        <div class="prop-row">
                            <label>Escala geral <span id="scale-value-label">1.0×</span></label>
                            <input type="range" id="prop-scale"
                                   min="0.5" max="2" step="0.05" value="1">
                        </div>
                    </div>
                </div>

            </div>
            <!-- /right-panel -->

        </div>
        <!-- /workspace -->

    </div>
    <script src="app.js"></script>
</body>
</html>
